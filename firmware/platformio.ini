[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:nrf9160]
platform = nordicnrf52
board = nrf9160_dk
framework = zephyr
monitor_speed = 115200

[env:glinet]
; GL.iNet GL-MT300N-V2 (OpenWrt target — uses the Python stack directly)
; This device runs the full Python backend, firmware layer is minimal
platform = native
